<!DOCTYPE html>
<html>
<head>
    <title>AuraGuard AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <button id="themeToggle" class="toggle">☀️ Light Mode</button>

    <h1>🛡️ AuraGuard AI</h1>
    <p>Detect pirated sports videos instantly</p>

    <!-- FILE INPUTS -->
    <input type="file" id="file1"><br>
    <video id="preview1" width="200" controls></video><br>

    <input type="file" id="file2"><br>
    <video id="preview2" width="200" controls></video><br>

    <button onclick="upload()">Scan for Piracy 🔍</button>

    <!-- LOADER -->
    <div id="loader" class="loader" style="display:none;"></div>

    <!-- PROCESS STEPS -->
    <div id="steps"></div>

    <!-- RESULT CARD -->
    <div id="resultCard" class="card" style="display:none;">
        <h2 id="statusText"></h2>
        <p id="percentageText"></p>
    </div>

    <button onclick="generateNotice()">Generate Takedown</button>
    <p id="notice"></p>

    <p class="note">Simulating real-time stream monitoring...</p>

</div>

<script src="script.js" defer></script>
</body>
</html>
