<!DOCTYPE html>
<html>
<head>
    <title>AuraGuard AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- 🌙 TOGGLE -->
    <button id="themeToggle">☀️ Light Mode</button>

    <h1>🛡️ AuraGuard AI</h1>
    <p>Detect pirated sports videos instantly</p>

    <input type="file" id="file1"><br>
    <input type="file" id="file2"><br>

    <button onclick="upload()">Scan for Piracy 🔍</button>

    <div id="loader" class="loader" style="display:none;"></div>

    <div id="resultCard" class="card" style="display:none;">
        <h2 id="statusText"></h2>
        <p id="percentageText"></p>
    </div>

    <!-- ✅ FIXED BUTTON -->
    <button onclick="generateNotice()">Generate Takedown</button>

    <!-- ✅ IMPORTANT -->
    <p id="notice"></p>

</div>

<!-- ⚠️ VERY IMPORTANT -->
<script src="script.js" defer></script>

</body>
</html>
